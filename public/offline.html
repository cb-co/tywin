<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cashly — Offline</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf7f0;
        color: #17211c;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }
      .card {
        max-width: 22rem;
        padding: 2rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.5rem;
        color: #6a7168;
      }
      button {
        border: none;
        border-radius: 0.6rem;
        background: #0f7a54;
        color: #f6fbf8;
        padding: 0.6rem 1.25rem;
        font-size: 0.95rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Cashly needs a connection to load your accounts. Check your network
        and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
